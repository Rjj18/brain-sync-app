services:
  web:
    env_file:
      - .env.production
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FLASK_ENV: production
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./secrets:/app/secrets:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
