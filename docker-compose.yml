services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FLASK_ENV: development
      PORT: 5000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5000,http://localhost:3000}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-brain-sync-app}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-brain-sync-app}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/app/secrets/service-account.json}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
    command: python app.py
