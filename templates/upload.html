<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain-Sync | Upload</title>
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #0284c7;
        --accent-hover: #0369a1;
        --border: #cbd5e1;
        --ok-bg: #dcfce7;
        --ok-text: #166534;
        --err-bg: #fee2e2;
        --err-text: #991b1b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .wrapper {
        width: min(780px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.09);
        padding: 22px;
      }

      h1 {
        margin: 0;
      }

      .subtitle {
        margin: 8px 0 18px;
        color: var(--muted);
      }

      .top-links {
        margin-bottom: 16px;
      }

      .top-links a {
        color: var(--accent-hover);
        text-decoration: none;
        font-weight: 600;
      }

      .alert {
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 14px;
        font-weight: 600;
      }

      .alert.ok {
        background: var(--ok-bg);
        color: var(--ok-text);
      }

      .alert.error {
        background: var(--err-bg);
        color: var(--err-text);
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        font-size: 0.92rem;
        font-weight: 600;
      }

      input,
      select,
      textarea {
        width: 100%;
        margin-top: 6px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
      }

      textarea {
        min-height: 100px;
        resize: vertical;
      }

      button {
        border: 1px solid transparent;
        background: var(--accent);
        color: white;
        border-radius: 10px;
        padding: 11px 14px;
        font-size: 0.96rem;
        font-weight: 700;
        cursor: pointer;
        transition: background-color 150ms ease;
      }

      button:hover {
        background: var(--accent-hover);
      }
    </style>
  </head>
  <body>
    <main class="wrapper">
      <div class="top-links">
        <a href="/">Voltar para inicio</a>
      </div>
      <h1>Upload de Material</h1>
      <p class="subtitle">Envie TXT/PDF ou texto manual para gerar cards e revisao de leitura.</p>

      {% if success %}
        <div class="alert ok">{{ success }}</div>
      {% endif %}
      {% if error %}
        <div class="alert error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/upload-material" enctype="multipart/form-data" id="uploadForm">
        <label>
          Tipo de conteudo
          <select name="content_kind" id="contentKind" required>
            <option value="card" selected>Card (pergunta e resposta)</option>
            <option value="reading_excerpt">Revisao de leitura (trecho)</option>
            <option value="auto">Automatico (gera card + trecho)</option>
          </select>
        </label>

        <label>
          Arquivo TXT/PDF (opcional)
          <input type="file" name="material_file" accept=".txt,.pdf,application/pdf,text/plain" />
        </label>

        <label>
          Capitulo
          <input type="number" name="chapter" min="1" placeholder="Obrigatorio para card" />
        </label>

        <label>
          Tema
          <input type="text" name="topic" required placeholder="Ex.: neurociencia, filosofia, matematica" />
        </label>

        <label>
          Titulo da fonte (livro/artigo)
          <input type="text" name="source_title" placeholder="Ex.: Sapiens, Artigo sobre memoria" />
        </label>

        <label>
          Pergunta ativa
          <textarea id="questionField" name="question" required placeholder="Ex.: Quais pontos principais deste tema?"></textarea>
        </label>

        <label>
          Resposta
          <textarea id="answerField" name="answer" required placeholder="Escreva a resposta esperada"></textarea>
        </label>

        <label>
          Reflexao
          <textarea name="reflection" placeholder="Resumo da sua reflexao"></textarea>
        </label>

        <label>
          Trecho de apoio
          <textarea name="text" placeholder="Trecho de livro, artigo ou anotacao"></textarea>
        </label>

        <button type="submit">Salvar material</button>
      </form>

      <script>
        (function () {
          const kindSelect = document.getElementById("contentKind");
          const questionField = document.getElementById("questionField");
          const answerField = document.getElementById("answerField");

          if (!kindSelect || !questionField || !answerField) {
            return;
          }

          function syncRequiredFields() {
            const kind = kindSelect.value;
            const requiresQA = kind === "card";
            questionField.required = requiresQA;
            answerField.required = requiresQA;
          }

          kindSelect.addEventListener("change", syncRequiredFields);
          syncRequiredFields();
        })();
      </script>
    </main>
  </body>
</html>
